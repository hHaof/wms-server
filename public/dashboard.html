<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tổng quan — WMS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h1>📦 WMS</h1><span>Quản lý kho hàng</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Menu</div>
      <a class="nav-link" href="/dashboard.html"><span class="nav-icon">🏠</span> Tổng quan</a>
      <a class="nav-link" href="/inventory.html"><span class="nav-icon">📦</span> Kho hàng</a>
      <a class="nav-link" href="/orders.html"><span class="nav-icon">📋</span> Đơn hàng</a>
      <a class="nav-link" href="/packing.html"><span class="nav-icon">🔖</span> Đóng gói</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">
        <span>🚪</span> Đăng xuất (<span id="user-name">...</span>)
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-title">Tổng quan</div>
      <div class="topbar-user">
        <div class="user-avatar" id="user-avatar">?</div>
      </div>
    </header>

    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Xin chào, <span id="greeting-name">...</span> 👋</div>
          <div class="page-subtitle" id="greeting-date"></div>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="stats-grid" id="stats-grid">
        <div class="loading"><div class="spinner"></div> Đang tải...</div>
      </div>

      <!-- Recent orders -->
      <div class="card mt-16">
        <div class="card-header">
          <div class="card-title">Đơn hàng gần đây</div>
          <a href="/orders.html" class="btn btn-secondary btn-sm">Xem tất cả</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Mã đơn</th>
                <th>Khách hàng</th>
                <th>Trạng thái</th>
                <th>Tổng tiền</th>
                <th>Ngày tạo</th>
              </tr>
            </thead>
            <tbody id="recent-orders">
              <tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  requireAuth();
  markActiveNav();
  renderUser();

  const user = getUser();
  if (user) {
    document.getElementById('greeting-name').textContent = user.name;
    document.getElementById('user-avatar').textContent = user.name[0].toUpperCase();
  }
  document.getElementById('greeting-date').textContent =
    new Date().toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  async function loadDashboard() {
    try {
      const [prodData, orderData] = await Promise.all([
        Products.list({ limit: 200 }),
        Orders.list({ limit: 200 }),
      ]);

      const products = prodData.products || [];
      const orders   = orderData.orders   || [];

      const lowStock  = products.filter(p => p.stock <= p.lowStockThreshold).length;
      const pending   = orders.filter(o => o.status === 'pending').length;
      const packed    = orders.filter(o => o.status === 'packed').length;
      const shipped   = orders.filter(o => o.status === 'shipped').length;

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div class="stat-label">Sản phẩm</div>
              <div class="stat-value">${products.length}</div>
              <div class="stat-sub ${lowStock > 0 ? 'text-danger' : ''}">${lowStock} sắp hết hàng</div>
            </div>
            <div class="stat-icon">📦</div>
          </div>
        </div>
        <div class="stat-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div class="stat-label">Chờ đóng gói</div>
              <div class="stat-value" style="color:var(--warning)">${pending}</div>
              <div class="stat-sub">đơn hàng</div>
            </div>
            <div class="stat-icon">⏳</div>
          </div>
        </div>
        <div class="stat-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div class="stat-label">Đã đóng gói</div>
              <div class="stat-value" style="color:var(--primary)">${packed}</div>
              <div class="stat-sub">đơn hàng</div>
            </div>
            <div class="stat-icon">📫</div>
          </div>
        </div>
        <div class="stat-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div class="stat-label">Đã giao</div>
              <div class="stat-value" style="color:var(--success)">${shipped}</div>
              <div class="stat-sub">đơn hàng</div>
            </div>
            <div class="stat-icon">✅</div>
          </div>
        </div>
      `;

      const recent = orders.slice(0, 8);
      const tbody = document.getElementById('recent-orders');
      if (recent.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="empty-icon">📋</div><p>Chưa có đơn hàng nào</p></div></td></tr>`;
      } else {
        const h = escapeHtml;
        tbody.innerHTML = recent.map(o => `
          <tr>
            <td class="fw-600">${h(o.orderNumber)}</td>
            <td>${h(o.customer.name)}<br><span class="text-muted" style="font-size:12px">${h(o.customer.phone)}</span></td>
            <td>${statusBadge(o.status)}</td>
            <td>${formatCurrency(o.totalAmount)}</td>
            <td>${formatDate(o.createdAt)}</td>
          </tr>
        `).join('');
      }
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  loadDashboard();
</script>
</body>
</html>
