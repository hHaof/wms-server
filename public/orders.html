<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders — WMS</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">CallMe F&amp;L</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-label">Navigation</span>

      <a class="nav-link" href="/dashboard.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
        </svg>
        <span>Dashboard</span>
      </a>

      <a class="nav-link" href="/inventory.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
        </svg>
        <span>Inventory</span>
      </a>

      <a class="nav-link" href="/orders.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/>
        </svg>
        <span>Orders</span>
      </a>

      <a class="nav-link" href="/packing.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z"/>
        </svg>
        <span>Fulfillment</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-name">...</div>
        </div>
        <button class="sidebar-logout-btn" onclick="logout()" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────────────────────────── -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-title">Orders</div>
      <div class="topbar-user">
        <div class="user-avatar" id="topbar-avatar">?</div>
      </div>
    </header>

    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Orders</div>
          <div class="page-subtitle">Manage and track order fulfillment</div>
        </div>
        <div class="gap-row">
          <button class="btn btn-secondary" id="btn-export" onclick="exportExcel()">Export Excel</button>
          <button class="btn btn-primary" onclick="showModal('modal-create')">+ New Order</button>
        </div>
      </div>

      <div class="card">
        <div class="toolbar">
          <input class="form-control toolbar-search" id="search-input" placeholder="Search order number, customer..." />
          <select class="form-control" id="status-filter" style="width:160px" onchange="loadOrders(1)">
            <option value="">All statuses</option>
            <option value="pending">Pending</option>
            <option value="packed">Packed</option>
            <option value="shipped">Shipped</option>
          </select>
          <button class="btn btn-secondary" onclick="loadOrders(1)">Filter</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Order #</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Created</th>
                <th class="text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="order-table">
              <tr><td colspan="7"><div class="loading"><div class="spinner"></div> Loading...</div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>

<!-- Modal: Create order -->
<div class="modal" id="modal-create">
  <div class="modal-box" style="max-width:580px">
    <div class="modal-header">
      <div class="modal-title">New Order</div>
      <button class="modal-close" onclick="closeModal('modal-create')">✕</button>
    </div>
    <div class="modal-body">
      <p class="fw-600" style="margin-bottom:12px">Customer Info</p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Customer Name *</label>
          <input class="form-control" id="c-name" required placeholder="John Smith" />
        </div>
        <div class="form-group">
          <label class="form-label">Phone *</label>
          <input class="form-control" id="c-phone" required placeholder="0901234567" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Delivery Address *</label>
        <input class="form-control" id="c-address" required placeholder="123 Main St, District 1" />
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin:18px 0 10px">
        <p class="fw-600">Items</p>
        <button type="button" class="btn btn-secondary btn-sm" onclick="addItemRow()">+ Add Item</button>
      </div>
      <div id="items-container"></div>

      <div class="form-group" style="margin-top:12px">
        <label class="form-label">Note</label>
        <textarea class="form-control" id="order-note" rows="2" placeholder="Additional notes..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" onclick="closeModal('modal-create')">Cancel</button>
      <button type="button" class="btn btn-primary" id="btn-create" onclick="submitCreate()">Create Order</button>
    </div>
  </div>
</div>

<!-- Modal: Update status -->
<div class="modal" id="modal-status">
  <div class="modal-box" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title">Update Status</div>
      <button class="modal-close" onclick="closeModal('modal-status')">✕</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:12px">Order: <strong id="status-order-num"></strong></p>
      <div class="form-group">
        <label class="form-label">New Status</label>
        <select class="form-control" id="new-status">
          <option value="packed">Packed</option>
          <option value="shipped">Shipped</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Note (optional)</label>
        <input class="form-control" id="status-note" placeholder="Notes..." />
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" onclick="closeModal('modal-status')">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="submitStatus()">Update</button>
    </div>
  </div>
</div>

<!-- Modal: Order detail -->
<div class="modal" id="modal-detail">
  <div class="modal-box" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title" id="detail-title">Order Details</div>
      <button class="modal-close" onclick="closeModal('modal-detail')">✕</button>
    </div>
    <div class="modal-body" id="detail-body">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script src="./js/api.js"></script>
<script>
  requireAuth();
  markActiveNav();
  renderUser();

  const user = getUser();
  if (user) {
    const initials = user.name[0].toUpperCase();
    document.getElementById('user-avatar').textContent   = initials;
    document.getElementById('topbar-avatar').textContent = initials;
  }

  const h = escapeHtml;
  let currentPage = 1;
  let selectedOrderId = null;
  let allProducts = [];
  const orderCache = new Map();

  async function loadProducts() {
    try {
      const data = await Products.list({ limit: 200 });
      allProducts = data?.products || [];
    } catch (_) {}
  }

  async function loadOrders(page = 1) {
    currentPage = page;
    const search = document.getElementById('search-input').value.trim();
    const status = document.getElementById('status-filter').value;

    document.getElementById('order-table').innerHTML =
      `<tr><td colspan="7"><div class="loading"><div class="spinner"></div> Loading...</div></td></tr>`;

    try {
      const params = { page, limit: 15 };
      if (search) params.search = search;
      if (status) params.status = status;

      const data = await Orders.list(params);
      renderTable(data?.orders || []);
      renderPagination(data?.pagination || { totalPages: 1, page: 1 });
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  function renderTable(orders) {
    const tbody = document.getElementById('order-table');
    if (!orders.length) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty"><div class="empty-icon">📋</div><p>No orders found</p></div>
      </td></tr>`;
      return;
    }
    orders.forEach(o => orderCache.set(o._id, o));
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td class="fw-600" style="font-family:monospace;font-size:12.5px">${h(o.orderNumber)}</td>
        <td>
          <div class="fw-600">${h(o.customer.name)}</div>
          <div class="text-muted" style="font-size:12px">${h(o.customer.phone)}</div>
        </td>
        <td class="text-muted">${o.items.length} item${o.items.length !== 1 ? 's' : ''}</td>
        <td class="fw-600">${formatCurrency(o.totalAmount)}</td>
        <td>${statusBadge(o.status)}</td>
        <td class="text-muted" style="font-size:12.5px">${formatDate(o.createdAt)}</td>
        <td class="text-right">
          <div class="gap-row" style="justify-content:flex-end">
            <button class="btn btn-secondary btn-xs" onclick="viewDetail('${o._id}')">Details</button>
            ${o.status !== 'shipped'
              ? `<button class="btn btn-primary btn-xs" onclick="openStatusModal('${o._id}')">Update</button>`
              : ''}
          </div>
        </td>
      </tr>
    `).join('');
  }

  function renderPagination({ totalPages, page }) {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="loadOrders(${page-1})" ${page===1?'disabled':''}>‹</button>`;
    for (let i = 1; i <= totalPages; i++)
      html += `<button class="page-btn ${i===page?'active':''}" onclick="loadOrders(${i})">${i}</button>`;
    html += `<button class="page-btn" onclick="loadOrders(${page+1})" ${page===totalPages?'disabled':''}>›</button>`;
    el.innerHTML = html;
  }

  // ─── Create order ─────────────────────────────────────────────────────────────

  let itemRows = [];

  function addItemRow() {
    const id = Date.now();
    itemRows.push(id);
    const options = allProducts.map(p =>
      `<option value="${p._id}">${p.name} (${p.sku}) — stock: ${p.stock}</option>`
    ).join('');

    const el = document.createElement('div');
    el.id = `item-${id}`;
    el.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
    el.innerHTML = `
      <select class="form-control" style="flex:2" data-field="product">
        <option value="">-- Select product --</option>
        ${options}
      </select>
      <input class="form-control" type="number" min="1" value="1" style="width:80px" data-field="quantity" />
      <button type="button" class="btn btn-danger btn-xs" onclick="removeItem(${id})">✕</button>
    `;
    document.getElementById('items-container').appendChild(el);
  }

  function removeItem(id) {
    document.getElementById(`item-${id}`)?.remove();
    itemRows = itemRows.filter(i => i !== id);
  }

  async function submitCreate() {
    const name    = document.getElementById('c-name').value.trim();
    const phone   = document.getElementById('c-phone').value.trim();
    const address = document.getElementById('c-address').value.trim();
    const note    = document.getElementById('order-note').value.trim();

    if (!name || !phone || !address) {
      toast('Please fill in all customer info', 'error'); return;
    }

    const items = [];
    for (const id of itemRows) {
      const row = document.getElementById(`item-${id}`);
      if (!row) continue;
      const product  = row.querySelector('[data-field="product"]').value;
      const quantity = parseInt(row.querySelector('[data-field="quantity"]').value, 10);
      if (!product)  { toast('Please select a product for all rows', 'error'); return; }
      if (!quantity || quantity < 1) { toast('Quantity must be at least 1', 'error'); return; }
      items.push({ product, quantity });
    }
    if (!items.length) { toast('Order needs at least 1 item', 'error'); return; }

    const btn = document.getElementById('btn-create');
    btn.disabled = true; btn.textContent = 'Creating...';
    try {
      await Orders.create({ customer: { name, phone, address }, items, note });
      toast('Order created successfully');
      ['c-name','c-phone','c-address','order-note'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('items-container').innerHTML = '';
      itemRows = [];
      closeModal('modal-create');
      loadOrders(currentPage);
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Create Order';
    }
  }

  // ─── Update status ────────────────────────────────────────────────────────────

  function openStatusModal(id) {
    const o = orderCache.get(id);
    if (!o) return;
    selectedOrderId = id;
    document.getElementById('status-order-num').textContent = o.orderNumber;
    document.getElementById('status-note').value = '';

    const sel = document.getElementById('new-status');
    sel.innerHTML = '';
    if (o.status === 'pending') sel.add(new Option('Packed', 'packed'));
    if (o.status === 'packed')  sel.add(new Option('Shipped', 'shipped'));
    showModal('modal-status');
  }

  async function submitStatus() {
    const status = document.getElementById('new-status').value;
    const note   = document.getElementById('status-note').value.trim();
    try {
      await Orders.updateStatus(selectedOrderId, status, note);
      toast('Status updated successfully');
      closeModal('modal-status');
      loadOrders(currentPage);
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ─── Detail modal ─────────────────────────────────────────────────────────────

  async function viewDetail(id) {
    showModal('modal-detail');
    document.getElementById('detail-body').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const _res = await Orders.get(id);
      const o = _res?.order;
      if (!o) throw new Error('Order not found');
      document.getElementById('detail-title').textContent = o.orderNumber;
      document.getElementById('detail-body').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
          <div>
            <div class="text-muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Customer</div>
            <div class="fw-600">${h(o.customer.name)}</div>
            <div style="margin-top:2px">${h(o.customer.phone)}</div>
            <div class="text-muted" style="font-size:13px;margin-top:2px">${h(o.customer.address)}</div>
          </div>
          <div>
            <div class="text-muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Status</div>
            <div>${statusBadge(o.status)}</div>
            <div class="text-muted" style="font-size:12px;margin-top:6px">${formatDate(o.createdAt)}</div>
          </div>
        </div>
        <table style="width:100%;margin-bottom:16px">
          <thead><tr>
            <th>Item</th><th>SKU</th>
            <th class="text-right">Qty</th>
            <th class="text-right">Unit Price</th>
            <th class="text-right">Subtotal</th>
          </tr></thead>
          <tbody>
            ${o.items.map(i => `<tr>
              <td>${h(i.name)}</td>
              <td style="font-family:monospace;font-size:12px">${h(i.sku)}</td>
              <td class="text-right">${i.quantity}</td>
              <td class="text-right">${formatCurrency(i.price)}</td>
              <td class="text-right fw-600">${formatCurrency(i.subtotal)}</td>
            </tr>`).join('')}
          </tbody>
          <tfoot><tr style="border-top:2px solid var(--border)">
            <td colspan="4" class="text-right fw-600" style="padding:10px 16px">Total</td>
            <td class="text-right fw-600" style="padding:10px 16px;font-size:15px">${formatCurrency(o.totalAmount)}</td>
          </tr></tfoot>
        </table>
        ${o.note ? `<div class="text-muted" style="font-size:13px;margin-bottom:12px">📝 ${h(o.note)}</div>` : ''}
        <div>
          <div class="text-muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Status History</div>
          ${o.statusHistory.map(entry => `
            <div style="display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0">
              ${statusBadge(entry.status)}
              <span class="text-muted">${formatDate(entry.createdAt)}</span>
              ${entry.note ? `<span class="text-muted">— ${h(entry.note)}</span>` : ''}
            </div>
          `).join('')}
        </div>
      `;
    } catch (err) {
      document.getElementById('detail-body').innerHTML = `<p class="text-danger">${err.message}</p>`;
    }
  }

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadOrders(1);
  });

  // ─── Excel export ─────────────────────────────────────────────────────────────

  async function exportExcel() {
    const btn = document.getElementById('btn-export');
    btn.disabled = true; btn.textContent = 'Exporting...';
    try {
      const search = document.getElementById('search-input').value.trim();
      const status = document.getElementById('status-filter').value;
      const params = { limit: 100 };
      if (search) params.search = search;
      if (status) params.status = status;

      let all = [], page = 1, totalPages = 1;
      do {
        const data = await Orders.list({ ...params, page });
        all.push(...(data?.orders || []));
        totalPages = data?.pagination?.totalPages ?? 1;
        page++;
      } while (page <= totalPages);

      const statusLabel = { pending: 'Pending', packed: 'Packed', shipped: 'Shipped' };
      const rows = all.map(o => ({
        'Order #':   o.orderNumber,
        'Customer':  o.customer.name,
        'Phone':     o.customer.phone,
        'Address':   o.customer.address,
        'Items':     o.items.map(i => `${i.name} x${i.quantity}`).join('; '),
        'Total':     o.totalAmount,
        'Status':    statusLabel[o.status] || o.status,
        'Created':   new Date(o.createdAt).toLocaleString('en-US'),
      }));

      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [16,20,14,40,60,14,16,18].map(w => ({ wch: w }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Orders');
      XLSX.writeFile(wb, `orders-${new Date().toISOString().slice(0,10)}.xlsx`);
      toast(`Exported ${rows.length} orders`);
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Export Excel';
    }
  }

  Promise.all([loadProducts(), loadOrders(1)]);
</script>
</body>
</html>
