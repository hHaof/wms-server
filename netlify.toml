[build]
  # Netlify serves the public/ folder as static files
  publish = "public"
  # No build step needed — plain HTML/CSS/JS

[[redirects]]
  from = "/"
  to = "/dashboard.html"
  status = 302

[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR_BACKEND_URL/api/:splat"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
